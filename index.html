<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Horsedoku</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <div class="container">
      <h2>HorseDoku Puzzle</h2>
      <div class="grid-5x5">

        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>

        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>

        <div class="cell"></div>
        <div class="cell"></div>

        <div class="cell"></div>

        <div class="footer-grid"></div>

        <div class="grid-3x3">
          <div class="clickable-cell" style="border-top-left-radius: 16%;"></div>
          <div class="clickable-cell"></div>
          <div class="clickable-cell" style="border-top-right-radius: 16%;"></div>
          <div class="clickable-cell"></div>
          <div class="clickable-cell"></div>
          <div class="clickable-cell"></div>
          <div class="clickable-cell" style="border-bottom-left-radius: 16%;"></div>
          <div class="clickable-cell"></div>
          <div class="clickable-cell" style="border-bottom-right-radius: 16%;"></div>
        </div>
    </div>
    <footer class="footer">
      <hr aria-orientation="horizontal">
      <p>Game inspired by <a href="https://pokedoku.com/" target="_blank">PokeDoku</a>.</p>
    </footer>
  </main>

  <div id="popup-overlay" class="hidden">
    <div class="search-container">
    <section id="popup-box" class="search-box">
      <header class="info-popup">
        <p>Make a guess</p>
        <div class="info-stack"></div>
        <button id="close-btn">x</button>
      </header>
      <div class="popup-body">
        <div>
           <div class="stack hidden">
              <span>a</span>
              <span>b</span>
            </div>
          <input style = "margin-top: 16px;"
            type="text" 
            id="searchInput" 
            placeholder="Search horse..."
            autocomplete="off"
          >
        </div>
      </div>
        <ul role="list" class="horses-grid" id="horsesGrid"></ul>
      <footer></footer>
    </section>
    </div>
  </div>

  <div id="end-overlay" class="hidden">
    <div class="end-popup"></div>
  </div>


</div>


<script src="./js/puzzle-logic.js"></script>
<script src="./js/popup.js"></script>
<script src="./js/api.js"></script>
<script src="./js/search.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
